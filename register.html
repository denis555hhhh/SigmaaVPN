<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — SigmaVPN</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <span class="logo__icon">🔒</span>
        <span class="logo__text">SigmaVPN</span>
      </a>
    </div>
  </header>

  <section class="auth-section">
    <div class="auth-card">
      <div class="auth-card__logo">🔒</div>
      <h1>Создать аккаунт</h1>
      <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>

      <!-- STEP INDICATOR -->
      <div class="reg-steps">
        <div class="reg-step active" id="step1-dot">
          <span>1</span>
        </div>
        <div class="reg-step-line"></div>
        <div class="reg-step" id="step2-dot">
          <span>2</span>
        </div>
        <div class="reg-step-line"></div>
        <div class="reg-step" id="step3-dot">
          <span>3</span>
        </div>
      </div>
      <div class="reg-steps-labels">
        <span>Аккаунт</span>
        <span>Тариф</span>
        <span>Готово</span>
      </div>

      <!-- STEP 1: Account -->
      <form id="regForm" novalidate>
        <div id="stepOne">
          <div class="form-group">
            <label for="regName">Имя</label>
            <input type="text" id="regName" placeholder="Иван Иванов" required />
            <span class="form-error" id="regNameError"></span>
          </div>
          <div class="form-group">
            <label for="regEmail">Email</label>
            <input type="email" id="regEmail" placeholder="you@example.com" required />
            <span class="form-error" id="regEmailError"></span>
          </div>
          <div class="form-group">
            <label for="regPassword">Пароль</label>
            <div class="input-wrap">
              <input type="password" id="regPassword" placeholder="Минимум 8 символов" required minlength="8" />
              <button type="button" class="input-eye" id="togglePass" aria-label="Показать пароль">👁</button>
            </div>
            <div class="password-strength" id="passStrength">
              <div class="password-strength__bar">
                <div class="password-strength__fill" id="passBar"></div>
              </div>
              <span id="passLabel"></span>
            </div>
            <span class="form-error" id="regPasswordError"></span>
          </div>
          <div class="form-group">
            <label for="regPasswordConfirm">Повторите пароль</label>
            <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль" required />
            <span class="form-error" id="regPasswordConfirmError"></span>
          </div>
          <button type="button" class="btn btn--primary btn--full btn--lg" id="toStep2">
            Продолжить →
          </button>
        </div>

        <!-- STEP 2: Plan -->
        <div id="stepTwo" style="display:none">
          <p class="step-desc">Выберите тариф для начала работы</p>
          <div class="reg-plans">
            <label class="reg-plan" id="planBasic">
              <input type="radio" name="plan" value="basic" />
              <div class="reg-plan__inner">
                <div class="reg-plan__name">Базовый</div>
                <div class="reg-plan__price">99 ₽/мес</div>
                <div class="reg-plan__features">1 устройство · 16 стран</div>
              </div>
            </label>
            <label class="reg-plan reg-plan--popular" id="planStandard">
              <input type="radio" name="plan" value="standard" checked />
              <div class="reg-plan__badge">Популярный</div>
              <div class="reg-plan__inner">
                <div class="reg-plan__name">Стандарт</div>
                <div class="reg-plan__price">199 ₽/мес</div>
                <div class="reg-plan__features">3 устройства · 16 стран</div>
              </div>
            </label>
            <label class="reg-plan" id="planPremium">
              <input type="radio" name="plan" value="premium" />
              <div class="reg-plan__inner">
                <div class="reg-plan__name">Премиум</div>
                <div class="reg-plan__price">349 ₽/мес</div>
                <div class="reg-plan__features">6 устройств · 16 стран</div>
              </div>
            </label>
          </div>
          <div class="form-check" style="margin-top:20px">
            <input type="checkbox" id="regAgree" required />
            <label for="regAgree">Я принимаю <a href="#">условия использования</a> и <a href="#">политику конфиденциальности</a></label>
          </div>
          <span class="form-error" id="regAgreeError"></span>
          <div class="reg-nav">
            <button type="button" class="btn btn--outline" id="backToStep1">← Назад</button>
            <button type="button" class="btn btn--primary" id="toStep3">Зарегистрироваться</button>
          </div>
        </div>

        <!-- STEP 3: Success -->
        <div id="stepThree" style="display:none">
          <div class="reg-success">
            <div class="reg-success__icon">🎉</div>
            <h2>Аккаунт создан!</h2>
            <p id="successMsg"></p>
            <a href="index.html" class="btn btn--ghost" style="margin-top:12px">На главную</a>
          </div>
        </div>
      </form>

      <div class="auth-divider"><span>или</span></div>
      <div class="auth-social" id="socialBtns">
        <button class="btn btn--social">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Войти через Google
        </button>
      </div>
    </div>
  </section>

  <script src="main.js"></script>
  <script src="register.js"></script>
  <!-- TELEGRAM SUPPORT BUTTON -->
  <a href="https://t.me/slogg12" target="_blank" rel="noopener" class="tg-support" aria-label="Техподдержка в Telegram">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.17 13.667l-2.95-.924c-.64-.203-.658-.64.136-.954l11.57-4.461c.537-.194 1.006.131.968.893z" fill="white"/></svg>
    <span>Поддержка</span>
  </a>

</body>
</html>
